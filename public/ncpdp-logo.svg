<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- NCPDP Globe Mark -->
  <g transform="translate(0,5)">
    <!-- Globe circle -->
    <circle cx="25" cy="25" r="22" fill="none" stroke="#1B5FAA" stroke-width="2.5"/>
    <!-- Globe horizontal lines -->
    <ellipse cx="25" cy="25" rx="22" ry="10" fill="none" stroke="#1B5FAA" stroke-width="1.5"/>
    <!-- Globe vertical meridian -->
    <ellipse cx="25" cy="25" rx="10" ry="22" fill="none" stroke="#1B5FAA" stroke-width="1.5"/>
    <!-- Swoosh arcs -->
    <path d="M6 38 C12 28, 20 18, 44 12" stroke="#1B5FAA" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M3 32 C10 24, 22 16, 47 10" stroke="#1B5FAA" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
  </g>
  <!-- NCPDP Text -->
  <text x="58" y="38" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#1B5FAA" letter-spacing="-0.5">NCPDP</text>
  <!-- TM -->
  <text x="185" y="20" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#1B5FAA">TM</text>
</svg>
